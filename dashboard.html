<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantio Vector // AGI Alignment Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', backgroundColor: 'rgba(55, 48, 163, 0.4)' }, /* Indigo glow for AGI */
                            '100%': { opacity: '1', backgroundColor: 'transparent' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '1', boxShadow: '0 0 15px rgba(129, 140, 248, 0.6)' },
                            '50%': { opacity: '0.5', boxShadow: '0 0 5px rgba(129, 140, 248, 0.2)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen flex flex-col antialiased selection:bg-indigo-900 selection:text-indigo-50">

    <header class="bg-slate-900 border-b border-slate-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-8 h-8 rounded bg-gradient-to-br from-indigo-500 to-purple-700 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <span class="font-bold text-white text-xl leading-none tracking-tighter">∅</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-widest text-white uppercase">Vantio Vector</h1>
                    <p class="text-xs text-indigo-400 font-mono tracking-widest uppercase">AGI Alignment Hypervisor // Ring-0</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3 bg-slate-950 px-4 py-2 rounded-full border border-slate-800 shadow-inner">
                <div class="h-3 w-3 rounded-full bg-indigo-500 animate-pulse-glow"></div>
                <span class="text-xs font-mono text-indigo-400 uppercase tracking-widest">Containment Field Active</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="bg-slate-900 rounded-xl shadow-2xl border border-slate-800 overflow-hidden flex flex-col h-[calc(100vh-8rem)]">
            <div class="px-6 py-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                <h2 class="text-sm font-medium text-slate-400 uppercase tracking-widest">Autonomous Agent Telemetry</h2>
                <div class="text-xs text-slate-500 font-mono" id="last-updated">Waiting for telemetry...</div>
            </div>
            
            <div class="overflow-auto flex-grow bg-slate-950/50">
                <table class="min-w-full">
                    <thead class="bg-slate-900 sticky top-0 z-10 shadow-md">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Timestamp</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Agent PID</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Privilege</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Process Tree</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-indigo-400 uppercase tracking-wider">Execution Target</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Divergence Score</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="telemetry-body" class="bg-transparent">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const tbody = document.getElementById('telemetry-body');
        const lastUpdated = document.getElementById('last-updated');
        const seenEvents = new Set();

        async function fetchTelemetry() {
            try {
                const response = await fetch(`vantio-edr.json?t=${Date.now()}`);
                if (!response.ok) return;
                
                const text = await response.text();
                const lines = text.trim().split('\n');
                let parseSuccess = false;

                for (let line of lines) {
                    if (!line) continue;
                    try {
                        const log = JSON.parse(line);
                        const eventHash = `${log.timestamp}-${log.pid}-${log.payload || 'none'}`;
                        
                        if (!seenEvents.has(eventHash)) {
                            seenEvents.add(eventHash);
                            parseSuccess = true;
                            
                            const date = new Date(log.timestamp * 1000).toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
                            
                            let contextColor = log.context === 'ROOT (AGI)' 
                                ? 'text-red-400 font-bold bg-red-900/20 px-2 py-1 rounded' 
                                : 'text-slate-300 font-semibold bg-slate-800/50 px-2 py-1 rounded';

                            let scoreStr = log.score ? log.score : 'N/A';
                            let scoreColor = 'text-slate-400';
                            if (log.score >= 80) scoreColor = 'text-red-500 font-bold';
                            else if (log.score >= 50) scoreColor = 'text-yellow-500 font-bold';
                            else if (log.score > 0) scoreColor = 'text-indigo-400 font-bold';

                            const tr = document.createElement('tr');
                            tr.className = 'border-b border-slate-800/50 hover:bg-slate-800/80 transition-colors duration-500 animate-fade-in opacity-0';
                            
                            tr.innerHTML = `
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400 font-mono">${date}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-slate-300">${log.pid}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-xs tracking-wider"><span class="${contextColor}">${log.context}</span></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300 font-mono">${log.spawned_by || 'UNKNOWN'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-indigo-400 truncate max-w-[200px]" title="${log.payload || 'NONE'}">${log.payload || 'NONE'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-mono ${scoreColor}">${scoreStr}/100</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                    <span class="px-3 py-1 inline-flex text-xs leading-5 font-bold rounded-sm border border-emerald-500/30 bg-emerald-500/10 text-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                                        CONTAINED
                                    </span>
                                </td>
                            `;
                            tbody.prepend(tr);
                        }
                    } catch (e) {}
                }

                if (parseSuccess) {
                    const now = new Date();
                    lastUpdated.innerText = `Last Sync: ${now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' })}`;
                }
            } catch (err) {}
        }

        setInterval(fetchTelemetry, 1000);
        fetchTelemetry();
    </script>
</body>
</html>
