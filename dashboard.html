<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vantio Core | Global EDR Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* A subtle pulse animation for the live radar status */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-indicator { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-950 text-gray-300 font-mono p-8 h-screen overflow-hidden flex flex-col">
    
    <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
        <div>
            <h1 class="text-3xl text-red-500 font-bold tracking-widest">[ ∅ VANTIO VECTOR ]</h1>
            <p class="text-gray-500 mt-1 text-sm uppercase tracking-widest">Zero-Trust Telemetry Radar</p>
        </div>
        <div class="text-right">
            <span class="text-green-500 font-bold live-indicator">● LIVE RING-0 FEED</span>
            <p class="text-gray-600 text-xs mt-1">Polling every 1000ms</p>
        </div>
    </div>

    <div class="flex-grow overflow-auto border border-gray-800 rounded-lg bg-gray-900/50 shadow-2xl">
        <table class="w-full text-left border-collapse">
            <thead class="sticky top-0 bg-gray-950 border-b border-gray-800 shadow-sm text-xs uppercase tracking-wider text-gray-500">
                <tr>
                    <th class="p-4">Timestamp</th>
                    <th class="p-4">Target PID</th>
                    <th class="p-4">Attacker Context</th>
                    <th class="p-4">Ghost Ancestor</th>
                    <th class="p-4 text-right">Enforcement</th>
                </tr>
            </thead>
            <tbody id="telemetry-feed" class="text-sm">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchTelemetry() {
            try {
                // GOD-MODE CACHE BUSTER: Append the exact millisecond to force a fresh download
                const response = await fetch('./vantio-edr.json?t=' + Date.now());
                const text = await response.text();
                
                // Split the JSONL (JSON Lines) file into an array of strings
                const lines = text.trim().split('\n').filter(line => line.length > 0);
                
                const tableBody = document.getElementById('telemetry-feed');
                tableBody.innerHTML = ''; // Clear the table

                // Reverse the array so the newest kills are at the top!
                lines.reverse().forEach(line => {
                    try {
                        const log = JSON.parse(line);
                        
                        // Format the UNIX timestamp into a readable time
                        const date = new Date(log.timestamp * 1000);
                        const timeString = date.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(date.getMilliseconds()).padStart(3, '0');
                        
                        // Style the Attacker text based on root vs standard user
                        const contextColor = log.uid === 0 ? 'text-red-500 font-bold' : 'text-yellow-500 font-bold';
                        const contextLabel = log.uid === 0 ? 'ROOT (UID 0)' : `${log.context} (UID ${log.uid})`;

                        // Inject the row into the HTML
                        tableBody.innerHTML += `
                            <tr class="border-b border-gray-800/50 hover:bg-gray-800 transition-colors">
                                <td class="p-4 font-light text-gray-500">${timeString}</td>
                                <td class="p-4 text-blue-400">PID ${log.pid}</td>
                                <td class="p-4 ${contextColor}">${contextLabel}</td>
                                <td class="p-4 text-purple-400">${log.spawned_by}</td>
                                <td class="p-4 text-right text-red-500 font-bold tracking-widest">SIGKILL</td>
                            </tr>
                        `;
                    } catch (parseError) {
                        // Silently ignore incomplete JSON lines if the kernel is currently writing one
                    }
                });
            } catch (error) {
                console.error("Telemetry bridge offline:", error);
            }
        }

        // Poll the kernel log every 1 second
        setInterval(fetchTelemetry, 1000);
        fetchTelemetry();
    </script>
</body>
</html>
